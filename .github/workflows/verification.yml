name: Verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local:
    name: Local Python and Ruby gates
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out the candidate commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      - name: Select Ruby 3.2.2
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "3.2.2"

      - name: Install uv 0.10.4
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.4"

      - name: Sync the reviewed Python dependency graph
        run: uv sync --locked --python 3.10 --group test --group build

      - name: Run the single local verification entry point
        run: uv run --locked --group test --group build python scripts/verify.py local

      - name: Preserve the machine-readable verification report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: local-verification-${{ github.sha }}
          path: artifacts/verification/local.json
          if-no-files-found: error
          retention-days: 14
