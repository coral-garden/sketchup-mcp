name: Verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local:
    name: Local Python and Ruby gates
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out the candidate commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      - name: Install Python verification dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          --requirement requirements.txt "coverage[toml]==7.10.7"

      - name: Run the single local verification entry point
        run: python scripts/verify.py local

      - name: Preserve the machine-readable verification report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: local-verification-${{ github.sha }}
          path: artifacts/verification/local.json
          if-no-files-found: error
          retention-days: 14
